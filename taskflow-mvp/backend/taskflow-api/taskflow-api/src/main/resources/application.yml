server:
  port: 8081

spring:
  jackson:
    time-zone: UTC
  application:
    name: taskflow-api

  datasource:
    url: jdbc:postgresql://localhost:5434/taskflow?stringtype=unspecified
    username: taskflow_user
    password: taskflow_pass

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  security:
    user:
      name: dev
      password: dev
jwt:
  secret: "taskflow_secret_key_super_segura_para_desarrollo"
  expiration: 86400000