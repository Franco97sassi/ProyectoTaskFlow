<section class="task-form-page">
  <header class="form-header">
    <div>
      <p class="eyebrow">{{ taskId ? 'Edición' : 'Creación' }} de tarea</p>
      <h2>{{ taskId ? 'Editar' : 'Nueva' }} tarea</h2>
      <p>Completá los datos clave para planificar responsable, prioridad y fecha.</p>
    </div>
    <a routerLink="/tasks">Volver al listado</a>
  </header>

  <form class="task-form" [formGroup]="form" (ngSubmit)="save()">
    <label class="full">
      Título
      <input placeholder="Ej: Preparar demo de TaskFlow" formControlName="title" />
      <small *ngIf="form.controls.title.touched && form.controls.title.invalid">El título es obligatorio.</small>
    </label>

    <label class="full">
      Descripción
      <textarea placeholder="Agregá contexto, entregables o pasos importantes" formControlName="description"></textarea>
    </label>

    <label>
      Estado
      <select formControlName="status">
        <option *ngFor="let status of statuses" [value]="status.value">{{ status.label }}</option>
      </select>
    </label>

    <label>
      Fecha límite
      <input type="date" formControlName="dueDate" />
    </label>

    <fieldset class="priority-options full">
      <legend>Prioridad</legend>
      <label *ngFor="let priority of priorities" [class.selected]="form.controls.priority.value === priority.value">
        <input type="radio" formControlName="priority" [value]="priority.value" />
        <span>{{ priority.label }}</span>
        <small>{{ priority.hint }}</small>
      </label>
    </fieldset>

    <label>
       Proyecto
      <select formControlName="projectId">
        <option [ngValue]="0" disabled>Seleccioná un proyecto</option>
        <option *ngFor="let project of projects" [ngValue]="project.id">
          {{ project.name }}
        </option>
      </select>
      <small *ngIf="!projects.length">Creá un proyecto desde la API antes de cargar tareas.</small>
          </label>

    <label>
      Usuario asignado
      <select formControlName="assignedToUserId">
        <option *ngFor="let user of users" [ngValue]="user.id">{{ user.name }} · {{ user.email }}</option>
      </select>
      <small *ngIf="!users.length">Registrá usuarios antes de asignar tareas.</small>    </label>

    <div class="form-actions full">
      <button type="submit" [disabled]="form.invalid">Guardar tarea</button>
      <a routerLink="/tasks">Cancelar</a>
    </div>
  </form>
</section>
